<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Médias</title>

  <style>
    body {
      font-family: Arial;
    }

    #resultado {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Calculadora de Média 📚</h2>


  <input type="number" id="nota1" placeholder="Digite a primeira nota">
  <input type="number" id="nota2" placeholder="Digite a segunda nota">

  <br><br>

  <button id="btnCalcular">Calcular Média</button>

  <p id="resultado"></p>

  <script>

   
    function calcularMedia(n1, n2) {
      let media = (n1 + n2) / 2;
      let situacao;

     
      if (media >= 7) {
        situacao = "Aprovado";
      } else if (media >= 5) {
        situacao = "Recuperação";
      } else {
        situacao = "Reprovado";
      }

      return { media, situacao };
    }

  
    document.getElementById("btnCalcular").addEventListener("click", function() {

    
      let n1 = Number(document.getElementById("nota1").value);
      let n2 = Number(document.getElementById("nota2").value);

      let resultado = document.getElementById("resultado");

     
      if (isNaN(n1) || isNaN(n2) || n1 < 0 || n2 < 0) {
        resultado.textContent = "Digite notas válidas!";
        resultado.style.color = "black";
        return;
      }

  
      let dados = calcularMedia(n1, n2);

     
      resultado.textContent = "Média: " + dados.media.toFixed(2) + " - " + dados.situacao;

      if (dados.situacao === "Aprovado") {
        resultado.style.color = "green";
      } else if (dados.situacao === "Recuperação") {
        resultado.style.color = "orange";
      } else {
        resultado.style.color = "red";
      }

    });

  </script>

</body>
</html>
